repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false
      - id: import-linter
        name: import-linter (architecture boundaries)
        entry: uv run lint-imports
        language: system
        types: [python]
        pass_filenames: false
      - id: schema-drift
        name: schema/v1.json matches models
        entry: >-
          bash -c 'uv run python scripts/generate_schema.py &&
          git diff --exit-code schema/v1.json'
        language: system
        types: [python]
        pass_filenames: false
